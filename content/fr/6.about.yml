title: À propos de Megurumi Creative
description: Découvrez la créatrice derrière les patrons d'amigurumi magiques et rejoignez une communauté passionnée par l'art du crochet.

hero:
  title: Salut, je suis la Créatrice de Megurumi Creative !
  description: |
    Bienvenue dans mon petit coin du monde du crochet ! Je suis passionnée par la création de patrons d'amigurumi
    adorables qui apportent de la joie aux artisans partout. Ce qui a commencé comme un hobby personnel s'est
    transformé en une communauté d'enthousiastes du crochet partageant l'amour des créations faites main.
  image: img/brand/hero.png

process:
  title: De l'Idée au Patron
  description: Comment je crée chaque personnage d'amigurumi adorable
  steps:
    - title: 1. Design & Esquisse
      description: Chaque personnage commence par une esquisse simple et une vision
      icon: i-heroicons-pencil-square
    - title: 2. Test & Raffinement
      description: Je crochète plusieurs prototypes pour perfectionner chaque patron
      icon: i-heroicons-cog-6-tooth
    - title: 3. Tutoriels Gratuits
      description: Vidéos YouTube étape par étape que tout le monde peut suivre
